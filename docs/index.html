<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DLSHealth | Self Check</title>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        min-height: 100vh;
        font-family: Arial, Helvetica, sans-serif;

        background-color: #f0f2f5;
        background-image:
            radial-gradient(
                ellipse 80% 60% at 50% -10%,
                rgba(0, 102, 51, 0.08) 0%,
                transparent 60%
            ),
            repeating-linear-gradient(
                0deg,
                transparent,
                transparent 79px,
                #ebeef2 80px
            ),
            repeating-linear-gradient(
                90deg,
                transparent,
                transparent 79px,
                #ebeef2 80px
            );

        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
    }

    .hero {
        width: 100%;
        max-width: 650px;
    }

    .hero-card {
        background: #fff;
        border: 1px solid #e4e7ec;
        border-radius: 16px;
        padding: 50px 40px;
        text-align: center;

        box-shadow:
            0 0 0 1px rgba(0, 0, 0, .03),
            0 20px 40px rgba(0, 0, 0, .08);

        animation: fadeUp .6s ease;
    }

    @keyframes fadeUp {
        from {
            opacity: 0;
            transform: translateY(20px);
        }

        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    .hero-label {
        display: inline-block;
        font-size: 11px;
        font-weight: 700;
        letter-spacing: .25em;
        color: #006633;
        margin-bottom: 16px;
    }

    .hero-card h1 {
        font-size: 3rem;
        color: #111827;
        margin-bottom: 16px;
    }

    .hero-card p {
        color: #6b7280;
        line-height: 1.7;
        max-width: 500px;
        margin: 0 auto 30px;
    }

    .btn-primary {
        display: inline-block;
        background: #006633;
        color: white;
        text-decoration: none;

        padding: 14px 30px;
        border-radius: 8px;

        font-weight: 600;
        letter-spacing: .05em;
        text-transform: uppercase;

        transition: .25s;
    }

    .btn-primary:hover {
        background: #004d26;
        transform: translateY(-2px);

        box-shadow:
            0 8px 20px rgba(0, 102, 51, .25);
    }

    @media (max-width: 768px) {
        .hero-card {
            padding: 40px 25px;
        }

        .hero-card h1 {
            font-size: 2.2rem;
        }
    }
</style>
</head>

<body>

<section class="hero">
    <div class="hero-card">

        <span class="hero-label">DLSHEALTH</span>

        <h1>DLSHealth Self Check</h1>

        <p>
            Take a quick look at your health status and stay informed
            with a simple, guided self-check experience.
        </p>

        <a href="self-check/bmi-calculator.html" class="btn-primary">
            Start Self Check
        </a>

    </div>
</section>

</body>

</html>
