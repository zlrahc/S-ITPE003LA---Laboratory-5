<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>BMI Calculator</title>

  <link rel="stylesheet" href="main.css">
  <script src="script.js" defer></script>

  <style>
    .hidden {
      display: none;
    }
  </style>

</head>

<body>

  <div class="form-header">

    <span>BMI TOOL</span>
    <h2>Calculate Your Body Mass Index</h2>
    <p>Enter your details below to check your BMI classification.</p>

  </div>

  <div class="container">

    <form id="bmiForm">

      <label for="name">Full Name</label>
      <input type="text" id="name" required>

      <label for="age">Age</label>
      <input type="number" id="age" min="1" max="120" required>

      <label>Sex</label>
      <select id="sex" required>
        <option value="">Select</option>
        <option value="Female">Female</option>
        <option value="Male">Male</option>
      </select>

      <label for="weight">Weight (kg)</label>
      <input type="number" id="weight" min="1" required>
      
      <label for="height">Height (cm)</label>
      <input type="number" id="height" min="1" required>

      <div class="button-group">

        <button type="submit">Check My BMI</button>
        <button type="reset" id="resetBtn">Reset</button>

      </div>

    </form>

    <section id="resultCard" class="hidden"></section>

  </div>

</body>

</html>
